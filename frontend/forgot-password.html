<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Event Management</title>
    <link rel="stylesheet" href="css/style.css?v=42.0">
    <link rel="stylesheet" href="css/navbar.css?v=42.0">
    <link rel="stylesheet" href="css/forms.css?v=42.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Slightly larger sizing for the short Forgot Password form */
        .form-group { margin-bottom: 20px !important; }
        .form-group label { margin-bottom: 8px !important; font-size: 0.95rem !important; }
        .form-group input { padding: 12px 14px !important; font-size: 1rem !important; }
        .btn { padding: 12px !important; font-size: 1rem !important; }
    </style>
</head>

<body
    style="background: url('images/wedding/img4.jpeg') no-repeat center center fixed; background-size: cover; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <!-- Blur Overlay Container -->
    <div
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); backdrop-filter:blur(15px); z-index:-1;">
    </div>

    <!-- Back to Home Button -->
    <a href="index.html" style="position: absolute; top: 25px; left: 25px; display: flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 8px 16px; background: rgba(255,255,255,0.15); border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10;" onmouseover="this.style.background='rgba(255,255,255,0.25)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='translateY(0)';">
        <i class="fas fa-home"></i> Back to Home
    </a>

    <div class="auth-wrapper" style="width: 100%; max-width: 420px; padding: 20px;">
        <!-- Logo ABOVE the card -->
        <div class="auth-logo-header" style="text-align: center; margin-bottom: 12px;">
            <a href="index.html" style="text-decoration: none;">
                <img src="images/logo.jpeg" alt="Event's By Patel Logo"
                    style="width: 50px; height: 50px; border-radius: 12px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
                <h2
                    style="color: #ffffff; font-size: 1.5rem; margin: 0; font-weight: 700; letter-spacing: -0.5px; text-shadow: 0 4px 10px rgba(0,0,0,0.6);">
                    Event's By Patel</h2>
            </a>
        </div>

        <div class="form-container"
            style="background: rgba(255,255,255,0.95); border-radius: var(--radius-lg); width: 100%; padding: 40px 30px; margin: 0; box-shadow: 0 20px 40px rgba(0,0,0,0.25);">
            
            <h2 style="text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--secondary-color); font-weight: 700; border-bottom: none;">Forgot Password</h2>
            
            <p style="text-align: center; margin-bottom: 25px; color: #666; font-size: 0.95rem; line-height: 1.5;">Enter your email to receive a password
                reset link.</p>
                
            <div id="status-msg"
                style="text-align: center; display: none; margin-bottom: 15px; padding: 10px; border-radius: 4px; font-size: 0.9rem;">
            </div>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 5px;">Send Reset Link</button>
            </form>
            <div class="auth-links" style="margin-top: 25px; text-align: center;">
                <p>Remembered your password? <a href="login.html" style="font-weight: 600; text-decoration: none;">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=42.0"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('status-msg');
            const btn = e.target.querySelector('button');

            // Extract the base domain for netlify/render
            const frontendUrl = window.location.origin;

            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await Api.post('/auth/forgot-password', { email: email, frontend_url: frontendUrl });
                const data = await res.json();

                statusMsg.textContent = data.message || "If an account with that email exists, a reset link has been sent.";
                statusMsg.style.display = 'block';
                statusMsg.style.backgroundColor = '#d4edda';
                statusMsg.style.color = '#155724';
            } catch (err) {
                statusMsg.textContent = "Failed to send reset email. Please try again.";
                statusMsg.style.display = 'block';
                statusMsg.style.backgroundColor = '#f8d7da';
                statusMsg.style.color = '#721c24';
            } finally {
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
