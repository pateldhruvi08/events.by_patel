<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Event Management</title>
    <link rel="stylesheet" href="css/style.css?v=42.0">
    <link rel="stylesheet" href="css/navbar.css?v=42.0">
    <link rel="stylesheet" href="css/forms.css?v=42.0">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><img src="images/logo.jpeg" alt="Event Master" class="logo-img"> <span
                    class="logo-text">Event's By Patel</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Forgot Password</h2>
            <div id="status-msg"
                style="text-align: center; display: none; margin-bottom: 10px; padding: 10px; border-radius: 4px;">
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Enter your email to receive a password
                reset link.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Send Reset Link</button>
            </form>
            <div class="auth-links" style="margin-top: 15px; text-align: center;">
                <p>Remembered your password? <a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=42.0"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('status-msg');
            const btn = e.target.querySelector('button');

            // Extract the base domain for netlify/render
            const frontendUrl = window.location.origin;

            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const res = await Api.post('/auth/forgot-password', { email: email, frontend_url: frontendUrl });
                const data = await res.json();

                statusMsg.textContent = data.message || "If an account with that email exists, a reset link has been sent.";
                statusMsg.style.display = 'block';
                statusMsg.style.backgroundColor = '#d4edda';
                statusMsg.style.color = '#155724';
            } catch (err) {
                statusMsg.textContent = "Failed to send reset email. Please try again.";
                statusMsg.style.display = 'block';
                statusMsg.style.backgroundColor = '#f8d7da';
                statusMsg.style.color = '#721c24';
            } finally {
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
