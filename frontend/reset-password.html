<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Event Management</title>
    <link rel="stylesheet" href="css/style.css?v=41.0">
    <link rel="stylesheet" href="css/navbar.css?v=41.0">
    <link rel="stylesheet" href="css/forms.css?v=41.0">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><img src="images/logo.jpeg" alt="Event Master" class="logo-img"> <span
                    class="logo-text">Event's By Patel</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Reset Password</h2>
            <div id="status-msg"
                style="text-align: center; display: none; margin-bottom: 10px; padding: 10px; border-radius: 4px;">
            </div>
            <form id="reset-form">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" required minlength="6">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Setup New Password</button>
            </form>
            <div class="auth-links" style="margin-top: 15px; text-align: center;">
                <p><a href="login.html">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=41.0"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const form = document.getElementById('reset-form');
            form.innerHTML = '<p style="color:red; text-align:center;">Invalid password reset link. No token provided.</p>';
        } else {
            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const pwd1 = document.getElementById('new_password').value;
                const pwd2 = document.getElementById('confirm_password').value;
                const statusMsg = document.getElementById('status-msg');

                if (pwd1 !== pwd2) {
                    statusMsg.textContent = "Passwords do not match.";
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = '#f8d7da';
                    statusMsg.style.color = '#721c24';
                    return;
                }

                const btn = e.target.querySelector('button');
                btn.textContent = 'Updating...';
                btn.disabled = true;

                try {
                    const res = await Api.post('/auth/reset-password', {
                        token: token,
                        new_password: pwd1
                    });

                    if (res.ok) {
                        statusMsg.textContent = "Password has been successfully updated! You can now login.";
                        statusMsg.style.display = 'block';
                        statusMsg.style.backgroundColor = '#d4edda';
                        statusMsg.style.color = '#155724';

                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        const data = await res.json();
                        throw new Error(data.detail || "Invalid or expired token");
                    }
                } catch (err) {
                    statusMsg.textContent = err.message || "Failed to reset password. Please try again or request a new link.";
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = '#f8d7da';
                    statusMsg.style.color = '#721c24';
                } finally {
                    btn.textContent = 'Setup New Password';
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>

</html>
