<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Event Management</title>
    <link rel="stylesheet" href="css/style.css?v=42.0">
    <link rel="stylesheet" href="css/navbar.css?v=42.0">
    <link rel="stylesheet" href="css/forms.css?v=42.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Extreme Height Compression */
        .form-group { margin-bottom: 12px !important; }
        .form-group label { margin-bottom: 4px !important; font-size: 0.85rem !important; }
        .form-group input { padding: 8px 12px !important; font-size: 0.95rem !important; }
        .btn { padding: 10px !important; font-size: 0.95rem !important; }
    </style>
</head>

<body
    style="background: url('images/wedding/img4.jpeg') no-repeat center center fixed; background-size: cover; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <!-- Blur Overlay Container -->
    <div
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); backdrop-filter:blur(15px); z-index:-1;">
    </div>

    <!-- Back to Home Button -->
    <a href="index.html" style="position: absolute; top: 25px; left: 25px; display: flex; align-items: center; gap: 8px; color: #fff; text-decoration: none; font-size: 0.95rem; font-weight: 500; padding: 8px 16px; background: rgba(255,255,255,0.15); border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 10;" onmouseover="this.style.background='rgba(255,255,255,0.25)'; this.style.transform='translateY(-2px)';" onmouseout="this.style.background='rgba(255,255,255,0.15)'; this.style.transform='translateY(0)';">
        <i class="fas fa-home"></i> Back to Home
    </a>

    <div class="auth-wrapper" style="width: 100%; max-width: 420px; padding: 20px;">
        <!-- Logo ABOVE the card -->
        <div class="auth-logo-header" style="text-align: center; margin-bottom: 12px;">
            <a href="index.html" style="text-decoration: none;">
                <img src="images/logo.jpeg" alt="Event's By Patel Logo"
                    style="width: 50px; height: 50px; border-radius: 12px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
                <h2
                    style="color: #ffffff; font-size: 1.5rem; margin: 0; font-weight: 700; letter-spacing: -0.5px; text-shadow: 0 4px 10px rgba(0,0,0,0.6);">
                    Event's By Patel</h2>
            </a>
        </div>

        <div class="form-container"
            style="background: rgba(255,255,255,0.95); border-radius: var(--radius-lg); width: 100%; padding: 25px 20px; margin: 0; box-shadow: 0 20px 40px rgba(0,0,0,0.25);">
            
            <h2 style="text-align: center; margin-bottom: 15px; font-size: 1.35rem; color: var(--secondary-color); font-weight: 700; border-bottom: none;">Reset Password</h2>
            
            <div id="status-msg"
                style="text-align: center; display: none; margin-bottom: 15px; padding: 8px; border-radius: 4px; font-size: 0.85rem;">
            </div>
            
            <form id="reset-form">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <input type="password" id="confirm_password" required minlength="6">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 5px;">Setup New Password</button>
            </form>
            <div class="auth-links" style="margin-top: 15px; text-align: center;">
                <p><a href="login.html" style="font-weight: 600; text-decoration: none;">Back to Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=42.0"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const form = document.getElementById('reset-form');
            form.innerHTML = '<p style="color:red; text-align:center;">Invalid password reset link. No token provided.</p>';
        } else {
            document.getElementById('reset-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const pwd1 = document.getElementById('new_password').value;
                const pwd2 = document.getElementById('confirm_password').value;
                const statusMsg = document.getElementById('status-msg');

                if (pwd1 !== pwd2) {
                    statusMsg.textContent = "Passwords do not match.";
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = '#f8d7da';
                    statusMsg.style.color = '#721c24';
                    return;
                }

                const btn = e.target.querySelector('button');
                btn.textContent = 'Updating...';
                btn.disabled = true;

                try {
                    const res = await Api.post('/auth/reset-password', {
                        token: token,
                        new_password: pwd1
                    });

                    if (res.ok) {
                        statusMsg.textContent = "Password has been successfully updated! You can now login.";
                        statusMsg.style.display = 'block';
                        statusMsg.style.backgroundColor = '#d4edda';
                        statusMsg.style.color = '#155724';

                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        const data = await res.json();
                        throw new Error(data.detail || "Invalid or expired token");
                    }
                } catch (err) {
                    statusMsg.textContent = err.message || "Failed to reset password. Please try again or request a new link.";
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = '#f8d7da';
                    statusMsg.style.color = '#721c24';
                } finally {
                    btn.textContent = 'Setup New Password';
                    btn.disabled = false;
                }
            });
        }
    </script>
</body>

</html>
