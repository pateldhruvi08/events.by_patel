<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Event Management</title>
    <link rel="stylesheet" href="css/style.css?v=34.0">
    <link rel="stylesheet" href="css/navbar.css?v=34.0">
    <link rel="stylesheet" href="css/forms.css?v=34.0">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><img src="images/logo.jpeg" alt="Event Master" class="logo-img"> <span class="logo-text">Event's By Patel</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
            <div id="error-msg" style="color: red; text-align: center; display: none; margin-bottom: 10px;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
            <div class="auth-links">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=34.0"></script>
    <script src="js/auth.js?v=34.0"></script>
</body>

</html>
